        name: body
        description: objeto beneficio a crear
        required: true
        schema:
          $ref: '#/definitions/models.Beneficio'
      responses:
        "201":
          description: '{string} id "id numérico del registro creado"'
        "400":
          description: error de parseo del body
        "500":
          description: error interno (ej. FK inválida)
  /beneficio/{id}:
