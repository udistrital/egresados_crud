        description: asc|desc, uno por sortby o único para todos
        type: string
      - in: query
        name: limit
        description: máximo de resultados (default 10, 0 = sin límite)
        type: integer
        format: int64
      - in: query
        name: offset
        description: desplazamiento (default 0)
        type: integer
        format: int64
      responses:
        "200":
          description: ""
          schema:
            type: array
            items:
